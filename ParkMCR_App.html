<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkMCR — Real-Time Parking Manchester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --green: #00e676;
      --yellow: #ffd600;
      --red: #ff1744;
      --text: #e8edf5;
      --muted: #6b7a96;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .last-updated {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      background: var(--surface);
      gap: 2px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 340px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Search */
    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      gap: 8px;
    }

    .search-icon { color: var(--muted); font-size: 14px; }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      width: 100%;
    }

    .search-box input::placeholder { color: var(--muted); }

    /* Filter pills */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-pill {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-pill:hover, .filter-pill.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,255,0.08);
    }

    /* Lot list */
    .lot-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .lot-list::-webkit-scrollbar { width: 4px; }
    .lot-list::-webkit-scrollbar-track { background: transparent; }
    .lot-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .lot-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .lot-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .lot-card.status-available::before { background: var(--green); }
    .lot-card.status-moderate::before { background: var(--yellow); }
    .lot-card.status-busy::before { background: var(--accent2); }
    .lot-card.status-full::before { background: var(--red); }

    .lot-card:hover, .lot-card.selected {
      border-color: var(--accent);
      background: #162035;
    }

    .lot-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .lot-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      padding-right: 8px;
      line-height: 1.3;
    }

    .lot-status-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .badge-available { background: rgba(0,230,118,0.15); color: var(--green); }
    .badge-moderate { background: rgba(255,214,0,0.15); color: var(--yellow); }
    .badge-busy { background: rgba(255,107,53,0.15); color: var(--accent2); }
    .badge-full { background: rgba(255,23,68,0.15); color: var(--red); }

    .lot-card-mid {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .occupancy-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .occupancy-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .fill-available { background: var(--green); }
    .fill-moderate { background: var(--yellow); }
    .fill-busy { background: var(--accent2); }
    .fill-full { background: var(--red); }

    .occupancy-pct {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      min-width: 35px;
      text-align: right;
    }

    .lot-card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lot-spaces {
      font-size: 12px;
      color: var(--muted);
    }

    .lot-spaces strong {
      color: var(--text);
      font-weight: 600;
    }

    .lot-price {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
    }

    /* ── MAP ── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* ── DETAIL PANEL ── */
    .detail-panel {
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .detail-panel.visible { display: flex; }

    .detail-close {
      display: flex;
      justify-content: flex-end;
    }

    .close-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .close-btn:hover { color: var(--text); border-color: var(--accent); }

    .detail-name {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
    }

    .detail-type {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-big-number {
      text-align: center;
      padding: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .detail-avail-num {
      font-family: var(--font-mono);
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
    }

    .detail-avail-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .detail-bar-wrap {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }

    .detail-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .detail-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .detail-stat-val {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }

    .detail-stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .detail-address {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: flex;
      gap: 8px;
    }

    .detail-address-icon { flex-shrink: 0; margin-top: 1px; }

    .detail-updated {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }

    /* Leaflet custom styles */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      color: var(--text) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    }

    .leaflet-popup-tip { background: var(--surface) !important; }

    .map-popup { font-family: var(--font-body); min-width: 180px; }
    .map-popup-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .map-popup-row { display: flex; justify-content: space-between; font-size: 12px; color: #9aa5bc; margin-bottom: 3px; }
    .map-popup-val { color: var(--text); font-weight: 500; }

    /* Loading */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 16px;
    }

    .loading-overlay.hidden { display: none; }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .loading-dots span {
      animation: blink 1.2s infinite;
      font-size: 24px;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; bottom: 0; left: 0; right: 0; z-index: 50; max-height: 50vh; border-right: none; border-top: 1px solid var(--border); }
      .detail-panel { display: none !important; }
      .main { flex-direction: column; }
      #map { height: 50vh; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="loading-text">INITIALISING PARKMCR</div>
  <div class="loading-dots">
    <span>▮</span><span>▮</span><span>▮</span>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">Park<span>MCR</span></div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      Live Data
    </div>
    <div class="last-updated" id="lastUpdated">Connecting...</div>
  </div>
</header>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-value" id="statTotal">—</div>
    <div class="stat-label">Total Spaces</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statAvail" style="color: var(--green)">—</div>
    <div class="stat-label">Available</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statOcc" style="color: var(--accent2)">—</div>
    <div class="stat-label">Occupied</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statPct">—</div>
    <div class="stat-label">Occupancy</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statLots">8</div>
    <div class="stat-label">Car Parks</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Car Parks — Manchester</div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search car parks..." oninput="filterLots()"/>
      </div>
      <div class="filter-row">
        <button class="filter-pill active" onclick="setFilter('all', this)">All</button>
        <button class="filter-pill" onclick="setFilter('available', this)">Available</button>
        <button class="filter-pill" onclick="setFilter('moderate', this)">Moderate</button>
        <button class="filter-pill" onclick="setFilter('busy', this)">Busy</button>
        <button class="filter-pill" onclick="setFilter('full', this)">Full</button>
      </div>
    </div>
    <div class="lot-list" id="lotList"></div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-close">
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div>
      <div class="detail-name" id="detailName">—</div>
      <div class="detail-type" id="detailType">—</div>
    </div>
    <div class="detail-big-number">
      <div class="detail-avail-num" id="detailAvailNum">—</div>
      <div class="detail-avail-label">Spaces Available</div>
      <div class="detail-bar-wrap">
        <div class="detail-bar-fill" id="detailBar"></div>
      </div>
    </div>
    <div class="detail-stats">
      <div class="detail-stat">
        <div class="detail-stat-val" id="dTotal">—</div>
        <div class="detail-stat-label">Total</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-val" id="dOcc">—</div>
        <div class="detail-stat-label">Occupied</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-val" id="dPct">—</div>
        <div class="detail-stat-label">% Full</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-val" id="dPrice">—</div>
        <div class="detail-stat-label">Per Hour</div>
      </div>
    </div>
    <div class="detail-address">
      <span class="detail-address-icon">📍</span>
      <span id="detailAddress">—</span>
    </div>
    <div class="detail-updated" id="detailUpdated">—</div>
  </div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────
  let parkingData = [];
  let markers = {};
  let selectedId = null;
  let currentFilter = 'all';
  let map;

  // ─── Simulated data (mirrors server logic, works standalone) ─────────────
  const BASE_LOTS = [
    { id:1, name:"Manchester Arndale NCP", lat:53.4831, lng:-2.2367, totalSpaces:1800, type:"Multi-storey", address:"Church St, Manchester M4 3AQ", pricePerHour:3.5 },
    { id:2, name:"Piccadilly Gardens Car Park", lat:53.4808, lng:-2.2347, totalSpaces:450, type:"Surface", address:"Piccadilly, Manchester M1 1RG", pricePerHour:2.8 },
    { id:3, name:"Deansgate Q-Park", lat:53.4772, lng:-2.2490, totalSpaces:750, type:"Multi-storey", address:"Great Bridgewater St, Manchester M1 5JW", pricePerHour:4.0 },
    { id:4, name:"Northern Quarter Parking", lat:53.4845, lng:-2.2330, totalSpaces:280, type:"Surface", address:"Tib St, Manchester M4 1LN", pricePerHour:2.0 },
    { id:5, name:"Spinningfields NCP", lat:53.4790, lng:-2.2510, totalSpaces:600, type:"Multi-storey", address:"Hardman St, Manchester M3 3EB", pricePerHour:3.8 },
    { id:6, name:"Oxford Road Car Park", lat:53.4740, lng:-2.2380, totalSpaces:320, type:"Multi-storey", address:"Oxford Rd, Manchester M1 7ED", pricePerHour:2.5 },
    { id:7, name:"Salford Central Parking", lat:53.4840, lng:-2.2640, totalSpaces:200, type:"Surface", address:"Chapel St, Salford M3 5JJ", pricePerHour:1.5 },
    { id:8, name:"Printworks Car Park", lat:53.4822, lng:-2.2390, totalSpaces:500, type:"Multi-storey", address:"Withy Grove, Manchester M4 2BS", pricePerHour:3.2 },
  ];

  function getSimulatedData() {
    const hour = new Date().getHours();
    let base;
    if (hour >= 8 && hour <= 10) base = 0.75;
    else if (hour >= 11 && hour <= 14) base = 0.85;
    else if (hour >= 15 && hour <= 18) base = 0.90;
    else if (hour >= 19 && hour <= 22) base = 0.50;
    else base = 0.20;

    return BASE_LOTS.map(lot => {
      const noise = (Math.random() - 0.5) * 0.15;
      const rate = Math.min(0.98, Math.max(0.05, base + noise));
      const occupied = Math.floor(lot.totalSpaces * rate);
      const available = lot.totalSpaces - occupied;
      const occupancyRate = Math.round(rate * 100);
      let status = occupancyRate >= 90 ? 'full' : occupancyRate >= 70 ? 'busy' : occupancyRate >= 40 ? 'moderate' : 'available';
      return { ...lot, occupied, available, occupancyRate, status, lastUpdated: new Date().toISOString() };
    });
  }

  // ─── Colour helpers ───────────────────────────────────────────────────────
  const STATUS_COLOR = { available:'#00e676', moderate:'#ffd600', busy:'#ff6b35', full:'#ff1744' };
  const STATUS_LABEL = { available:'Available', moderate:'Moderate', busy:'Busy', full:'Full' };

  function statusBadgeClass(s) { return `badge-${s}`; }
  function fillClass(s) { return `fill-${s}`; }

  // ─── Map marker SVG ───────────────────────────────────────────────────────
  function markerSVG(color, count) {
    return `<svg width="36" height="44" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 0C8 0 0 8 0 18C0 31 18 44 18 44C18 44 36 31 36 18C36 8 28 0 18 0Z" fill="${color}" opacity="0.95"/>
      <circle cx="18" cy="18" r="12" fill="#0a0e1a" opacity="0.7"/>
      <text x="18" y="23" text-anchor="middle" fill="white" font-family="Space Mono,monospace" font-size="${count > 999 ? '7' : count > 99 ? '8' : '10'}" font-weight="bold">${count > 9999 ? '9k+' : count}</text>
    </svg>`;
  }

  function createMarkerIcon(lot) {
    const color = STATUS_COLOR[lot.status];
    const svg = markerSVG(color, lot.available);
    return L.divIcon({
      html: svg,
      iconSize: [36, 44],
      iconAnchor: [18, 44],
      popupAnchor: [0, -44],
      className: ''
    });
  }

  // ─── Map init ─────────────────────────────────────────────────────────────
  function initMap() {
    map = L.map('map', { center: [53.4808, -2.2426], zoom: 14, zoomControl: true });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);
  }

  // ─── Render lots ─────────────────────────────────────────────────────────
  function renderLots() {
    const query = document.getElementById('searchInput').value.toLowerCase();

    const filtered = parkingData.filter(lot => {
      const matchesSearch = lot.name.toLowerCase().includes(query) || lot.address.toLowerCase().includes(query);
      const matchesFilter = currentFilter === 'all' || lot.status === currentFilter;
      return matchesSearch && matchesFilter;
    });

    // Sidebar
    const list = document.getElementById('lotList');
    list.innerHTML = '';
    filtered.forEach(lot => {
      const card = document.createElement('div');
      card.className = `lot-card status-${lot.status}${selectedId === lot.id ? ' selected' : ''}`;
      card.innerHTML = `
        <div class="lot-card-top">
          <div class="lot-name">${lot.name}</div>
          <div class="lot-status-badge ${statusBadgeClass(lot.status)}">${STATUS_LABEL[lot.status]}</div>
        </div>
        <div class="lot-card-mid">
          <div class="occupancy-bar-wrap">
            <div class="occupancy-bar-fill ${fillClass(lot.status)}" style="width:${lot.occupancyRate}%"></div>
          </div>
          <div class="occupancy-pct">${lot.occupancyRate}%</div>
        </div>
        <div class="lot-card-bottom">
          <div class="lot-spaces"><strong>${lot.available}</strong> of ${lot.totalSpaces} free</div>
          <div class="lot-price">£${lot.pricePerHour.toFixed(2)}/hr</div>
        </div>`;
      card.onclick = () => selectLot(lot.id);
      list.appendChild(card);
    });

    // Map markers
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};
    parkingData.forEach(lot => {
      const marker = L.marker([lot.lat, lot.lng], { icon: createMarkerIcon(lot) })
        .addTo(map)
        .bindPopup(`
          <div class="map-popup">
            <div class="map-popup-name">${lot.name}</div>
            <div class="map-popup-row"><span>Available</span><span class="map-popup-val" style="color:${STATUS_COLOR[lot.status]}">${lot.available} spaces</span></div>
            <div class="map-popup-row"><span>Occupancy</span><span class="map-popup-val">${lot.occupancyRate}%</span></div>
            <div class="map-popup-row"><span>Price</span><span class="map-popup-val">£${lot.pricePerHour.toFixed(2)}/hr</span></div>
          </div>
        `, { maxWidth: 220 });
      marker.on('click', () => selectLot(lot.id));
      markers[lot.id] = marker;
    });
  }

  // ─── Stats bar ────────────────────────────────────────────────────────────
  function updateStats() {
    const total = parkingData.reduce((s, l) => s + l.totalSpaces, 0);
    const avail = parkingData.reduce((s, l) => s + l.available, 0);
    const occ = parkingData.reduce((s, l) => s + l.occupied, 0);
    const pct = Math.round((occ / total) * 100);

    document.getElementById('statTotal').textContent = total.toLocaleString();
    document.getElementById('statAvail').textContent = avail.toLocaleString();
    document.getElementById('statOcc').textContent = occ.toLocaleString();
    document.getElementById('statPct').textContent = pct + '%';
  }

  // ─── Select lot ───────────────────────────────────────────────────────────
  function selectLot(id) {
    selectedId = id;
    const lot = parkingData.find(l => l.id === id);
    if (!lot) return;

    // Fly to marker
    map.flyTo([lot.lat, lot.lng], 16, { duration: 0.8 });
    if (markers[id]) markers[id].openPopup();

    // Detail panel
    const panel = document.getElementById('detailPanel');
    panel.classList.add('visible');

    document.getElementById('detailName').textContent = lot.name;
    document.getElementById('detailType').textContent = lot.type;

    const availNum = document.getElementById('detailAvailNum');
    availNum.textContent = lot.available;
    availNum.style.color = STATUS_COLOR[lot.status];

    const bar = document.getElementById('detailBar');
    bar.style.width = lot.occupancyRate + '%';
    bar.className = `detail-bar-fill ${fillClass(lot.status)}`;

    document.getElementById('dTotal').textContent = lot.totalSpaces.toLocaleString();
    document.getElementById('dOcc').textContent = lot.occupied.toLocaleString();
    document.getElementById('dPct').textContent = lot.occupancyRate + '%';
    document.getElementById('dPrice').textContent = '£' + lot.pricePerHour.toFixed(2);
    document.getElementById('detailAddress').textContent = lot.address;
    document.getElementById('detailUpdated').textContent = 'Updated: ' + new Date(lot.lastUpdated).toLocaleTimeString();

    renderLots();
  }

  function closeDetail() {
    selectedId = null;
    document.getElementById('detailPanel').classList.remove('visible');
    renderLots();
  }

  // ─── Filters ─────────────────────────────────────────────────────────────
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderLots();
  }

  function filterLots() { renderLots(); }

  // ─── Data fetch / refresh ────────────────────────────────────────────────
  async function fetchData() {
    // Try to hit the real backend; fall back to simulated data
    try {
      const res = await fetch('http://localhost:5000/api/parking', { signal: AbortSignal.timeout(2000) });
      if (!res.ok) throw new Error();
      parkingData = await res.json();
    } catch {
      parkingData = getSimulatedData();
    }

    updateStats();
    renderLots();

    // If a lot is selected, refresh its detail panel
    if (selectedId) selectLot(selectedId);

    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  }

  // ─── Boot ─────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    initMap();
    await fetchData();
    document.getElementById('loading').classList.add('hidden');

    // Refresh every 30 seconds
    setInterval(fetchData, 30000);
  });
</script>
</body>
</html>
